<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada — Enclave Accommodation</title>
    <script>
      sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body>
    <script>
      if (sessionStorage.redirect && sessionStorage.redirect !== location.href) {
        location.replace(sessionStorage.redirect);
        sessionStorage.removeItem("redirect");
      } else {
        location.replace("/");
      }
    </script>
  </body>
</html>
